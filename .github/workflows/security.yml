name: Security Audit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  audit:
    name: Dependency Audit
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        # Idempotent: skip rebuild on self-hosted runners that already
        # have cargo-audit, and avoid the rust-src download corruption
        # that bricks rustup on flaky-network reruns.
        run: command -v cargo-audit || cargo install --locked cargo-audit
      - name: Run cargo audit (deny warnings)
        run: cargo audit


  deny:
    name: Cargo Deny
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories sources
