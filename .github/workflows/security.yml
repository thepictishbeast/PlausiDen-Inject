name: Security Audit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  audit:
    name: Dependency Audit
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo audit (deny warnings)
        # Use the cargo-installed cargo-audit (≥0.22.x supports CVSS:4.0
        # vectors that newer RUSTSEC advisories use) — the OS-packaged
        # one in /usr/bin is 0.21.2 and bails with "unsupported CVSS
        # version". $CARGO_HOME is set by the rust-toolchain action.
        # AVP-PASS: 2026-04-27.
        run: $CARGO_HOME/bin/cargo-audit audit


  deny:
    name: Cargo Deny
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories sources
